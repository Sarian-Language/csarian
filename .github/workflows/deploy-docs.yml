# Builds docs/contributor-doc (Astro Starlight) and deploys to GitHub Pages.
# Repo settings → Pages → Source: GitHub Actions (required once).

name: Deploy documentation

on:
  push:
    branches: [main, Documentation]
    paths:
      - 'docs/contributor-doc/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs/contributor-doc/package-lock.json

      - name: Install and build
        working-directory: docs/contributor-doc
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
          BASE_PATH: /csarian
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/contributor-doc/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
